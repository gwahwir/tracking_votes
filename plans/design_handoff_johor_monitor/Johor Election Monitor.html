<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Johor Election Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="mock-data.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; overflow: hidden; background: #0a0a0f; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: #0a0a0f; }
  ::-webkit-scrollbar-thumb { background: #373a40; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #5c5f66; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .spin { animation: spin 0.8s linear infinite; display: inline-block; }
  @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  button:focus { outline: none; }
  input:focus { outline: 1px solid #00d4ff40; }
</style>
</head>
<body>
<div id="root"></div>

<script src="components.jsx" type="text/babel"></script>
<script src="map-panel.jsx" type="text/babel"></script>
<script src="analysis-panel.jsx" type="text/babel"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#00d4ff",
  "showAgentPanel": true,
  "compactFeed": false,
  "animatePulse": true
}/*EDITMODE-END*/;

// ── Tweaks Panel ──────────────────────────────────────────────────────────
const TweaksPanel = ({ tweaks, onTweak, onClose }) => (
  <div style={{ position:'fixed', bottom:'60px', right:'16px', width:'220px',
    background:'#0a0a0f', border:'1px solid #00d4ff', borderRadius:'6px',
    padding:'14px', zIndex:500, boxShadow:'0 0 24px rgba(0,212,255,0.2)', animation:'fadeIn 0.15s ease' }}>
    <div style={{ display:'flex', justifyContent:'space-between', marginBottom:'12px' }}>
      <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', fontWeight:700, color:'#00d4ff', letterSpacing:'0.1em' }}>TWEAKS</span>
      <button onClick={onClose} style={{ background:'none',border:'none',color:'#5c5f66',cursor:'pointer',fontSize:'12px' }}>✕</button>
    </div>
    {[
      { key:'showAgentPanel', label:'Agent Panel', type:'bool' },
      { key:'compactFeed', label:'Compact Feed', type:'bool' },
      { key:'animatePulse', label:'Live Pulse', type:'bool' },
    ].map(({ key, label, type }) => (
      <div key={key} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'10px' }}>
        <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#909296' }}>{label}</span>
        <button onClick={() => onTweak(key, !tweaks[key])}
          style={{ width:'36px', height:'18px', borderRadius:'9px', border:'none', cursor:'pointer',
            background: tweaks[key] ? '#00d4ff' : '#373a40', transition:'background 0.2s',
            position:'relative' }}>
          <span style={{ position:'absolute', top:'2px', left: tweaks[key] ? '20px' : '2px',
            width:'14px', height:'14px', borderRadius:'50%', background:'#0a0a0f', transition:'left 0.2s' }} />
        </button>
      </div>
    ))}
    <div style={{ borderTop:'1px solid #1a1b1e', paddingTop:'10px', marginTop:'4px' }}>
      <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'9px', color:'#5c5f66', marginBottom:'6px' }}>ACCENT COLOR</div>
      <div style={{ display:'flex', gap:'6px' }}>
        {['#00d4ff','#39ff14','#ff3131','#ff6633','#ffcc00'].map(c => (
          <button key={c} onClick={() => onTweak('accentColor', c)}
            style={{ width:'22px', height:'22px', borderRadius:'4px', background:c, border: tweaks.accentColor===c ? '2px solid #fff' : '2px solid transparent', cursor:'pointer' }} />
        ))}
      </div>
    </div>
  </div>
);

// ── App ───────────────────────────────────────────────────────────────────
const App = () => {
  const [mapType, setMapType] = React.useState('parlimen');
  const [useCartogram, setUseCartogram] = React.useState(false);
  const [selectedArticle, setSelectedArticle] = React.useState(null);
  const [selectedSeat, setSelectedSeat] = React.useState(null);
  const [wikiOpen, setWikiOpen] = React.useState(false);
  const [refreshing, setRefreshing] = React.useState(false);
  const [agentOpen, setAgentOpen] = React.useState(true);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [tweaks, setTweaks] = React.useState(() => {
    try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('jem-tweaks') || '{}') }; }
    catch { return TWEAK_DEFAULTS; }
  });

  const handleTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    localStorage.setItem('jem-tweaks', JSON.stringify(next));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  const handleRefresh = () => {
    setRefreshing(true);
    setTimeout(() => setRefreshing(false), 1400);
  };

  const handleSeatClick = (seat) => {
    setSelectedSeat(prev => prev?.code === seat.code ? null : seat);
    setSelectedArticle(null);
  };

  const handleArticleSelect = (article) => {
    setSelectedArticle(prev => prev?.id === article.id ? null : article);
    setSelectedSeat(null);
  };

  // Tweaks integration
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  // Restore session
  React.useEffect(() => {
    const saved = localStorage.getItem('jem-session');
    if (saved) { try { const s = JSON.parse(saved); setMapType(s.mapType || 'parlimen'); } catch {} }
  }, []);
  React.useEffect(() => {
    localStorage.setItem('jem-session', JSON.stringify({ mapType }));
  }, [mapType]);

  const accent = tweaks.accentColor || '#00d4ff';

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh', background:'#0a0a0f', overflow:'hidden' }}>
      <TopBar mapType={mapType} useCartogram={useCartogram}
        onMapTypeChange={setMapType} onCartogramToggle={() => setUseCartogram(p=>!p)}
        onRefresh={handleRefresh} onWikiOpen={() => setWikiOpen(true)} refreshing={refreshing} />

      <Scoreboard seats={MOCK_SEATS} />

      {/* 3-column grid */}
      <div style={{ flex:1, display:'grid', gridTemplateColumns:'300px 1fr 360px',
        gridTemplateRows:'1fr', overflow:'hidden', borderTop:'1px solid #1a1b1e' }}>

        {/* Left: Feed */}
        <div style={{ borderRight:'1px solid #373a40', overflow:'hidden', display:'flex', flexDirection:'column' }}>
          <NewsFeedPanel articles={MOCK_ARTICLES} selectedId={selectedArticle?.id} onSelect={handleArticleSelect} />
        </div>

        {/* Center: Map */}
        <div style={{ overflow:'hidden', display:'flex', flexDirection:'column', background:'#050508' }}>
          <MapPanel mapType={mapType} useCartogram={useCartogram} seats={MOCK_SEATS}
            onSeatClick={handleSeatClick} selectedCode={selectedSeat?.code} />
        </div>

        {/* Right: Analysis or Seat Detail */}
        <div style={{ borderLeft:'1px solid #373a40', overflow:'hidden', display:'flex', flexDirection:'column' }}>
          {selectedSeat
            ? <SeatDetailPanel seat={selectedSeat} onClose={() => setSelectedSeat(null)} />
            : <AnalysisPanel article={selectedArticle} />
          }
        </div>
      </div>

      {/* Agent Panel */}
      {tweaks.showAgentPanel && (
        <div style={{ borderTop:'1px solid #373a40', flexShrink:0 }}>
          <div style={{ display:'flex', alignItems:'center', borderBottom: agentOpen ? '1px solid #1a1b1e' : 'none' }}>
            <button onClick={() => setAgentOpen(p=>!p)}
              style={{ padding:'5px 14px', background:'none', border:'none', cursor:'pointer',
                display:'flex', alignItems:'center', gap:'6px', color:'#5c5f66' }}>
              <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'9px', letterSpacing:'0.12em', color:'#5c5f66' }}>
                {agentOpen ? '▼' : '▲'} AGENTS
              </span>
            </button>
            <div style={{ marginLeft:'auto', display:'flex', gap:'4px', padding:'0 10px' }}>
              {MOCK_TASKS.map(t => {
                const c = { completed:'#39ff14', running:'#00d4ff', pending:'#373a40', error:'#ff3131' }[t.status];
                return <div key={t.id} title={`${t.agent}: ${t.status}`}
                  style={{ width:'6px', height:'6px', borderRadius:'50%', background:c }} />;
              })}
            </div>
          </div>
          {agentOpen && <AgentPanel tasks={MOCK_TASKS} />}
        </div>
      )}

      {wikiOpen && <WikiModal onClose={() => setWikiOpen(false)} />}
      {tweaksOpen && <TweaksPanel tweaks={tweaks} onTweak={handleTweak} onClose={() => setTweaksOpen(false)} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
